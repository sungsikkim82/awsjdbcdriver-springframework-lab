spring:
  application:
    name: awsjdbcdriver-springframework-lab

datasource:
  writer:
    jdbc-url: jdbc:aws-wrapper:postgresql://${DB_WRITER_ENDPOINT}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: software.amazon.jdbc.Driver
    pool-name: writer-pool
    minimum-idle: 100
    maximum-pool-size: 500
    data-source-properties:
      wrapperProfileName: SF_F0
      readerHostSelectorStrategy: roundRobin
  reader:
    jdbc-url: jdbc:aws-wrapper:postgresql://${DB_READER_ENDPOINT}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: software.amazon.jdbc.Driver
    pool-name: reader-pool
    minimum-idle: 100
    maximum-pool-size: 500
    data-source-properties:
      wrapperProfileName: SF_F0
      readerHostSelectorStrategy: roundRobin

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
