<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS JDBC Driver Lab</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #232f3e; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        input, button { padding: 8px 12px; margin: 4px; }
        button { background: #ff9900; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ec7211; }
        #result { background: #f5f5f5; padding: 15px; border-radius: 8px; white-space: pre-wrap; margin-top: 15px; min-height: 50px; }
    </style>
</head>
<body>
<h1>AWS JDBC Driver Lab</h1>

<div class="section">
    <h3>Create User</h3>
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <button onclick="createUser()">Create</button>
</div>

<div class="section">
    <h3>Find User</h3>
    <input id="findId" placeholder="User ID (empty=all)">
    <button onclick="findUser()">Find</button>
</div>

<div class="section">
    <h3>Delete User</h3>
    <input id="deleteId" placeholder="User ID">
    <button onclick="deleteUser()">Delete</button>
</div>

<h3>Result</h3>
<div id="result">Ready.</div>

<script>
    const API = '/api/users';
    const result = document.getElementById('result');

    async function createUser() {
        const res = await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: document.getElementById('name').value, email: document.getElementById('email').value})
        });
        result.textContent = JSON.stringify(await res.json(), null, 2);
    }

    async function findUser() {
        const id = document.getElementById('findId').value;
        const res = await fetch(id ? `${API}/${id}` : API);
        result.textContent = JSON.stringify(await res.json(), null, 2);
    }

    async function deleteUser() {
        await fetch(`${API}/${document.getElementById('deleteId').value}`, {method: 'DELETE'});
        result.textContent = 'Deleted.';
    }
</script>
</body>
</html>
